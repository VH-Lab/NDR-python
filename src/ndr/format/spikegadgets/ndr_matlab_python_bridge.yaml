project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

functions:
  - name: copy_rec_files
    matlab_path: "+ndr/+format/+spikegadgets/copy_rec_files.m"
    python_path: "ndr/format/spikegadgets/copy_rec_files.py"
    input_arguments:
      - name: filename_in
        type_python: "str | Path"
      - name: s0
        type_python: "int"
      - name: s1
        type_python: "int"
      - name: filename_out
        type_python: "str | Path"
    output_arguments: []

  - name: read_rec_analogChannels
    matlab_path: "+ndr/+format/+spikegadgets/read_rec_analogChannels.m"
    python_path: "ndr/format/spikegadgets/read_rec_analogChannels.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
      - name: NumChannels
        type_python: "str | int"
      - name: channels
        type_python: "list[int]"
      - name: samplingRate
        type_python: "float"
      - name: headerSize
        type_python: "str | int"
      - name: s0
        type_python: "int"
      - name: s1
        type_python: "int"
      - name: configExists
        type_python: "bool"
    output_arguments:
      - name: recData
        type_python: "numpy.ndarray"
      - name: timestamps
        type_python: "numpy.ndarray"

  - name: read_rec_config
    matlab_path: "+ndr/+format/+spikegadgets/read_rec_config.m"
    python_path: "ndr/format/spikegadgets/read_rec_config.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
    output_arguments:
      - name: config
        type_python: "dict"
      - name: channels
        type_python: "list[dict]"

  - name: read_rec_digitalChannels
    matlab_path: "+ndr/+format/+spikegadgets/read_rec_digitalChannels.m"
    python_path: "ndr/format/spikegadgets/read_rec_digitalChannels.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
      - name: NumChannels
        type_python: "str | int"
      - name: channels
        type_python: "numpy.ndarray | list"
      - name: samplingRate
        type_python: "float"
      - name: headerSize
        type_python: "str | int"
      - name: s0
        type_python: "int"
      - name: s1
        type_python: "int"
      - name: configExists
        type_python: "bool"
    output_arguments:
      - name: recData
        type_python: "numpy.ndarray"
      - name: timestamps
        type_python: "numpy.ndarray"

  - name: read_rec_trodeChannels
    matlab_path: "+ndr/+format/+spikegadgets/read_rec_trodeChannels.m"
    python_path: "ndr/format/spikegadgets/read_rec_trodeChannels.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
      - name: NumChannels
        type_python: "str | int"
      - name: channels
        type_python: "list[int]"
      - name: samplingRate
        type_python: "float"
      - name: headerSize
        type_python: "str | int"
      - name: s0
        type_python: "int"
      - name: s1
        type_python: "int"
    output_arguments:
      - name: recData
        type_python: "numpy.ndarray"
      - name: timestamps
        type_python: "numpy.ndarray"
