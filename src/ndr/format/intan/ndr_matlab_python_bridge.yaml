project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

functions:
  - name: read_Intan_RHD2000_header
    matlab_path: "+ndr/+format/+intan/read_Intan_RHD2000_header.m"
    python_path: "ndr/format/intan/read_Intan_RHD2000_header.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
    output_arguments:
      - name: header
        type_python: "dict"

  - name: read_Intan_RHD2000_datafile
    matlab_path: "+ndr/+format/+intan/read_Intan_RHD2000_datafile.m"
    python_path: "ndr/format/intan/read_Intan_RHD2000_datafile.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
      - name: header_filename
        type_python: "str"
      - name: channeltype
        type_python: "str"
      - name: channel
        type_python: "int | list[int]"
      - name: t0
        type_python: "float"
      - name: t1
        type_python: "float"
    output_arguments:
      - name: data
        type_python: "numpy.ndarray"

  - name: Intan_RHD2000_blockinfo
    matlab_path: "+ndr/+format/+intan/Intan_RHD2000_blockinfo.m"
    python_path: "ndr/format/intan/read_Intan_RHD2000_datafile.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
      - name: header
        type_python: "dict"
    output_arguments:
      - name: blockinfo
        type_python: "dict"
      - name: bytes_per_block
        type_python: "int"
      - name: bytes_present
        type_python: "int"
      - name: num_data_blocks
        type_python: "int"

  - name: fread_QString
    matlab_path: "+ndr/+format/+intan/fread_QString.m"
    python_path: "ndr/format/intan/fread_QString.py"
    input_arguments:
      - name: fid
        type_python: "file-like"
    output_arguments:
      - name: a
        type_python: "str"

  - name: read_Intan_RHD2000_directory
    matlab_path: "+ndr/+format/+intan/read_Intan_RHD2000_directory.m"
    python_path: "ndr/format/intan/read_Intan_RHD2000_directory.py"
    input_arguments:
      - name: directoryname
        type_python: "str | Path"
      - name: header
        type_python: "dict | None"
      - name: channel_type
        type_python: "str | int"
      - name: channel_numbers
        type_python: "int | list[int]"
      - name: t0
        type_python: "float"
      - name: t1
        type_python: "float"
    output_arguments:
      - name: data
        type_python: "numpy.ndarray"
      - name: total_samples
        type_python: "int"
      - name: total_time
        type_python: "float"

  - name: cat_Intan_RHD2000_files
    matlab_path: "+ndr/+format/+intan/cat_Intan_RHD2000_files.m"
    python_path: "ndr/format/intan/cat_Intan_RHD2000_files.py"
    input_arguments:
      - name: filenames
        type_python: "str | Path (variadic)"
    output_arguments:
      - name: status
        type_python: "int"

  - name: concat_rhd_files
    matlab_path: "+ndr/+format/+intan/concat_rhd_files.m"
    python_path: "ndr/format/intan/concat_rhd_files.py"
    input_arguments:
      - name: dirname
        type_python: "str | Path"
    output_arguments: []

  - name: copy_Intan_RHD2000_blocks
    matlab_path: "+ndr/+format/+intan/copy_Intan_RHD2000_blocks.m"
    python_path: "ndr/format/intan/copy_Intan_RHD2000_blocks.py"
    input_arguments:
      - name: filename_in
        type_python: "str | Path"
      - name: b1
        type_python: "int"
      - name: b2
        type_python: "int"
      - name: filename_out
        type_python: "str | Path"
    output_arguments:
      - name: status
        type_python: "int"
