project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

functions:
  - name: about
    matlab_path: "+ndr/+format/+textSignal/about.m"
    python_path: "ndr/format/textSignal/about.py"
    input_arguments: []
    output_arguments: []
    notes: "Documentation-only module describing the textSignal file format."

  - name: readData
    matlab_path: "+ndr/+format/+textSignal/readData.m"
    python_path: "ndr/format/textSignal/readData.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
      - name: channels
        type_python: "list[int]"
      - name: t0
        type_python: "float"
      - name: t1
        type_python: "float"
      - name: dT
        type_python: "float"
      - name: timestamps
        type_python: "numpy.ndarray | None"
    output_arguments:
      - name: D
        type_python: "list[numpy.ndarray]"
      - name: T
        type_python: "numpy.ndarray"

  - name: readHeader
    matlab_path: "+ndr/+format/+textSignal/readHeader.m"
    python_path: "ndr/format/textSignal/readHeader.py"
    input_arguments:
      - name: filename
        type_python: "str | Path"
    output_arguments:
      - name: header
        type_python: "dict"
