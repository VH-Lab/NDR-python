project_metadata:
  bridge_version: "1.1"
  naming_policy: "Strict MATLAB Mirror"
  indexing_policy: "Semantic Parity (1-based for user concepts, 0-based for internal data)"

classes:
  - name: base
    type: class
    matlab_path: "+ndr/+reader/base.m"
    python_path: "ndr/reader/base.py"
    python_class: "ndr_reader_base"
    properties:
      - name: MightHaveTimeGaps
        type_python: "bool"
    methods:
      - name: canbereadtogether
        input_arguments:
          - name: channelstruct
            type_python: "list[dict]"
        output_arguments:
          - name: b
            type_python: "bool"
          - name: errormsg
            type_python: "str"
      - name: daqchannels2internalchannels
        input_arguments:
          - name: channelprefix
            type_python: "list[str]"
          - name: channelnumber
            type_python: "list[int]"
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
        output_arguments:
          - name: channelstruct
            type_python: "list[dict]"
      - name: epochclock
        input_arguments:
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
        output_arguments:
          - name: ec
            type_python: "list[ClockType]"
      - name: getchannelsepoch
        input_arguments:
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
        output_arguments:
          - name: channels
            type_python: "list[dict]"
      - name: underlying_datatype
        input_arguments:
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
          - name: channeltype
            type_python: "str"
          - name: channel
            type_python: "int | list[int]"
        output_arguments:
          - name: datatype
            type_python: "str"
          - name: p
            type_python: "numpy.ndarray"
          - name: datasize
            type_python: "int"
      - name: readchannels_epochsamples
        input_arguments:
          - name: channeltype
            type_python: "str"
          - name: channel
            type_python: "int | list[int]"
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
          - name: s0
            type_python: "int"
          - name: s1
            type_python: "int"
        output_arguments:
          - name: data
            type_python: "numpy.ndarray"
      - name: readevents_epochsamples_native
        input_arguments:
          - name: channeltype
            type_python: "str"
          - name: channel
            type_python: "int | list[int]"
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
          - name: t0
            type_python: "float"
          - name: t1
            type_python: "float"
        output_arguments:
          - name: timestamps
            type_python: "numpy.ndarray"
          - name: data
            type_python: "numpy.ndarray"
      - name: samplerate
        input_arguments:
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
          - name: channeltype
            type_python: "str"
          - name: channel
            type_python: "int | list[int]"
        output_arguments:
          - name: sr
            type_python: "float | numpy.ndarray"
      - name: t0_t1
        input_arguments:
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
        output_arguments:
          - name: t0t1
            type_python: "list[list[float]]"
      - name: samples2times
        input_arguments:
          - name: channeltype
            type_python: "str"
          - name: channel
            type_python: "int | list[int]"
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
          - name: s
            type_python: "numpy.ndarray | int"
        output_arguments:
          - name: t
            type_python: "numpy.ndarray"
      - name: times2samples
        input_arguments:
          - name: channeltype
            type_python: "str"
          - name: channel
            type_python: "int | list[int]"
          - name: epochstreams
            type_python: "list[str]"
          - name: epoch_select
            type_python: "int"
          - name: t
            type_python: "numpy.ndarray | float"
        output_arguments:
          - name: s
            type_python: "numpy.ndarray"
    static_methods:
      - name: mfdaq_channeltypes
        output_arguments:
          - name: ct
            type_python: "list[str]"
      - name: mfdaq_prefix
        input_arguments:
          - name: channeltype
            type_python: "str"
        output_arguments:
          - name: prefix
            type_python: "str"
      - name: mfdaq_type
        input_arguments:
          - name: channeltype
            type_python: "str"
        output_arguments:
          - name: type
            type_python: "str"

  - name: intan_rhd
    type: class
    matlab_path: "+ndr/+reader/intan_rhd.m"
    python_path: "ndr/reader/intan_rhd.py"
    python_class: "ndr_reader_intan__rhd"
    inherits: base
    methods:
      - name: daqchannels2internalchannels
      - name: t0_t1
      - name: getchannelsepoch
      - name: underlying_datatype
      - name: readchannels_epochsamples
      - name: samplerate
      - name: filenamefromepochfiles
        input_arguments:
          - name: filename_array
            type_python: "list[str]"
        output_arguments:
          - name: filename
            type_python: "str"
          - name: parentdir
            type_python: "str"
          - name: isdirectory
            type_python: "bool"
    static_methods:
      - name: mfdaqchanneltype2intanheadertype
      - name: intanheadertype2mfdaqchanneltype
      - name: mfdaqchanneltype2intanchanneltype
      - name: intanchanneltype2mfdaqchanneltype
      - name: intanname2mfdaqname
      - name: mfdaqchanneltype2intanfreqheader
      - name: intananychannelname2intanchanneltype

  - name: somecompany_someformat
    type: class
    matlab_path: "+ndr/+reader/somecompany_someformat.m"
    python_path: "ndr/reader/somecompany_someformat.py"
    python_class: "ndr_reader_somecompany__someformat"
    inherits: base
    notes: "Template/example reader class for creating new format readers."
